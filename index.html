<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanıdık Sesler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ADB5; 
            --primary-light: #EEEEEE; 
            --surface: #FFFFFF; 
            --text: #222831; 
            --subtext: #505560;
            --shadow: rgba(0, 0, 0, 0.08);
        }
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--primary-light);
            color: var(--text); margin: 0; padding: 30px 20px; min-height: 100vh;
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 950px; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: var(--primary); font-size: 2.8rem; margin: 0; }
        
        /* Arama Alanı */
        .search-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .option-label {
            cursor: pointer; padding: 10px 20px; border-radius: 25px; transition: 0.3s;
            background: var(--surface); border: 1px solid #ddd;
        }
        .option-label input { display: none; }
        .option-label:has(input:checked) { background-color: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }

        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] {
            flex: 1; padding: 15px 20px; border-radius: 8px; border: none;
            background: var(--surface); box-shadow: 0 4px 8px var(--shadow); outline: none; font-size: 1rem;
        }
        button.search-btn {
            padding: 0 25px; background-color: var(--primary); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* Film Listesi */
        #filmSecimListesi { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .film-secim-karti {
            width: 160px; background: var(--surface); border-radius: 10px; padding: 10px;
            text-align: center; cursor: pointer; box-shadow: 0 4px 10px var(--shadow); transition: 0.3s;
            border-bottom: 4px solid var(--primary);
        }
        .film-secim-karti img { width: 100%; height: 230px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }

        /* Film Detay Tablosu */
        .movie-result-card { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px var(--shadow); }
        .movie-header-box { padding: 20px 25px; background: #fdfdfd; border-bottom: 1px solid #eee; }
        .movie-title { font-size: 1.8rem; color: var(--primary); font-weight: 700; margin: 0; }
        .studio-info { color: var(--subtext); font-size: 0.95rem; margin-top: 5px; font-style: italic; }
        
        .cast-header-row {
            display: grid; grid-template-columns: 60px 1.5fr 1fr 1fr;
            padding: 12px 25px; background: #f8f9fa; font-weight: bold; font-size: 0.8rem; color: var(--subtext); text-transform: uppercase;
        }
        .cast-row {
            display: grid; grid-template-columns: 60px 1.5fr 1fr 1fr;
            align-items: center; padding: 15px 25px; border-bottom: 1px solid #eee;
        }
        .char-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-light); }
        .artist-link { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }

        /* Sanatçı Kartı */
        .artist-profile-card { background: var(--surface); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px var(--shadow); }
        .profile-header { display: flex; background: linear-gradient(135deg, var(--primary), #008f95); color: white; padding: 30px; align-items: center; gap: 30px; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.2); }
        .profile-body { padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .bio-section, .filmography-section { grid-column: span 2; border-top: 1px solid #eee; padding-top: 20px; }

        .geri-btn { background: var(--subtext); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-microphone-lines"></i> Tanıdık Sesler</h1>
            <p>Seslerin ardındaki stüdyoları ve sanatçıları keşfedin.</p>
        </header>

        <div class="search-options">
            <label class="option-label"><input type="radio" name="searchType" value="movie" checked> <i class="fas fa-film"></i> Film</label>
            <label class="option-label"><input type="radio" name="searchType" value="artist"> <i class="fas fa-user"></i> Sanatçı</label>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Film veya sanatçı..." oninput="aramaYap()">
            <button class="search-btn" onclick="aramaYap()">ARA</button>
        </div>
        
        <div id="backButtonContainer"></div>
        <div id="sonucAlani"></div>
    </div>
    <script src="data.js"></script>
</body>
</html>
