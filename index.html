<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanıdık Sesler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ADB5; 
            --primary-light: #EEEEEE; 
            --surface: #FFFFFF; 
            --text: #222831; 
            --subtext: #505560;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-light);
            color: var(--text); margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); font-size: 2.8rem; margin: 0; }
        
        /* Arama Paneli */
        .search-area { background: var(--surface); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 30px; }
        .search-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .option-label { cursor: pointer; padding: 10px 20px; border-radius: 25px; background: #f1f1f1; border: 1px solid #ddd; font-weight: 500; }
        .option-label input { display: none; }
        .option-label:has(input:checked) { background: var(--primary); color: white; border-color: var(--primary); }

        .search-input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        .search-btn { padding: 0 25px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Kart ve Tablo Tasarımları */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .movie-card { background: var(--surface); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px var(--shadow); transition: 0.3s; }
        .movie-card:hover { transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }

        .detail-card { background: var(--surface); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px var(--shadow); }
        .detail-header { padding: 25px; background: #fafafa; border-bottom: 2px solid var(--primary-light); }
        .studio-badge { display: inline-block; background: #e0f7f8; color: var(--primary); padding: 5px 12px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; margin-top: 10px; }

        .cast-table { width: 100%; border-collapse: collapse; }
        .cast-table th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--subtext); border-bottom: 2px solid #eee; }
        .cast-table td { padding: 15px; border-bottom: 1px solid #f1f1f1; vertical-align: middle; }
        
        .char-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid var(--primary-light); }
        .artist-link { color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* Sanatçı Profili */
        .profile-header { background: var(--primary); color: white; padding: 40px; display: flex; align-items: center; gap: 30px; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid rgba(255,255,255,0.2); }
        .profile-content { padding: 30px; }
        
        .back-btn { background: var(--subtext); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .error-msg { text-align: center; padding: 50px; color: #ff5e5e; }
    </style>
</head
