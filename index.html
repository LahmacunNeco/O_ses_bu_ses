<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanıdık Sesler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ADB5; 
            --primary-light: #EEEEEE; 
            --surface: #FFFFFF; 
            --text: #222831; 
            --subtext: #505560;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--primary-light);
            color: var(--text); margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 1000px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 5px; }

        /* Arama Alanı */
        .search-section { background: var(--surface); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 30px; }
        .search-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .option-label {
            cursor: pointer; padding: 8px 18px; border-radius: 20px; transition: 0.3s;
            background: #f1f1f1; border: 1px solid #ddd; font-size: 0.9rem;
        }
        .option-label input { display: none; }
        .option-label:has(input:checked) { background-color: var(--primary); color: white; border-color: var(--primary); }

        .search-box { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1; padding: 12px 20px; border-radius: 10px; border: 1px solid #ddd;
            outline: none; font-size: 1rem; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 173, 181, 0.1); }
        .search-btn { padding: 0 25px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Geri Dön Butonu */
        #backButtonContainer { margin-bottom: 20px; }
        .geri-btn { background: var(--subtext); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }

        /* Film Kartları (Grid) */
        #filmSecimListesi { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .film-secim-karti {
            background: var(--surface); border-radius: 12px; padding: 10px;
            text-align: center; cursor: pointer; box-shadow: 0 4px 10px var(--shadow); transition: 0.3s;
        }
        .film-secim-karti:hover { transform: translateY(-5px); }
        .film-secim-karti img { width: 100%; height: 230px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .film-secim-karti h4 { margin: 0; font-size: 0.9rem; }

        /* Film Detay ve Tablo Yapısı */
        .movie-card { background: var(--surface); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px var(--shadow); }
        .movie-header { padding: 25px; background: #fafafa; border-bottom: 2px solid var(--primary-light); }
        .movie-title { font-size: 1.8rem; color: var(--primary); margin: 0; font-weight: 700; }
        .studio-tag { display: inline-block; background: #e0f7f8; color: var(--primary); padding: 4px 12px; border-radius: 5px; font-size: 0.85rem; margin-top: 8px; font-weight: 600; }

        .cast-table { width: 100%; border-collapse: collapse; }
        .cast-table thead { background: #f8f9fa; }
        .cast-table th { text-align: left; padding: 15px 20px; font-size: 0.8rem; color: var(--subtext); text-transform: uppercase; border-bottom: 1px solid #eee; }
        .cast-table td { padding: 15px 20px; border-bottom: 1px solid #f1f1f1; vertical-align: middle; }
        
        .char-cell { display: flex; align-items: center; gap: 15px; }
        .char-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; }
        .artist-link { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: underline; }

        /* Sanatçı Profili */
        .profile-card { background: var(--surface); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px var(--shadow); }
        .profile-top { display: flex; background: var(--primary); color: white; padding: 30px; align-items: center; gap: 30px; }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); object-fit: cover; }
        .profile-info { padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .bio-box, .film-box { grid-column: span 2; border-top: 1px solid #eee; padding-top: 20px; }

        /* Hata Mesajı */
        .error-msg { text-align: center; padding: 40px; color: #ff5e5e; font-weight: 600; }

        @media (max-width: 600px) {
            .cast-table thead { display: none; }
            .cast-table td { display: block; padding: 10px 20px; border: none; }
            .cast-table tr { border-bottom: 1px solid #eee; display: block; padding: 10px 0; }
            .profile-top { flex-direction: column; text-align: center; }
            .profile-info { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-microphone-lines"></i> Tanıdık Sesler</h1>
            <p>Hep duyduğunuz o seslerin dünyasına hoş geldiniz.</p>
        </header>

        <div class="search-section">
            <div class="search-options">
                <label class="option-label">
                    <input type="radio" name="searchType" value="movie" checked onchange="aramaYap()"> 
                    <i class="fas fa-film"></i> Film Ara
                </label>
                <label class="option-label">
                    <input type="radio" name="searchType" value="artist" onchange="aramaYap()"> 
                    <i class="fas fa-user"></i> Sanatçı Ara
                </label>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Aramaya başlayın..." oninput="aramaYap()">
                <button class="search-btn" onclick="aramaYap()">ARA</button>
            </div>
        </div>
        
        <div id="backButtonContainer"></div>
        <div id="sonucAlani"></div>
    </div>

    <script src="data.js"></script>
</body>
</html>
